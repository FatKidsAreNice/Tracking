yolo_obb_bev_detector_node:
  ros__parameters:
    input_topic: /rslidar_points
    expected_frame_id: rslidar
    output_frame: rslidar

    model_path: /home/edv/ros2_ws/bev_dataset/models/rack_bev_obb_yolo26m_v4m_racksv2_best_epoch40.pt

    roi_min: [-14.5, -15.0, -2.0]
    roi_max: [9.0, 6.0, 3.0]
    resolution_m_per_px: 0.01

    density_clip_count: 12
    min_points_in_roi: 1000

    inference_interval_sec: 0.45
    imgsz: 1024

    model_confidence_threshold: 0.25
    confidence_threshold: 0.25
    iou_threshold: 0.50

    tile_size_px: 1024
    tile_overlap_ratio: 0.25
    side_confidence_threshold: 0.25
    top_confidence_threshold: 0.25
    obb_nms_iou_threshold: 0.20

    deduplicate_physical_racks: true
    physical_merge_distance_m: 0.45
    physical_merge_iou_threshold: 0.05
    physical_prefer_side_visible: true

    device: "0"

    marker_size: [1.05, 1.05, 2.00]
    marker_yaw_mode: fixed
    marker_fixed_yaw_rad: -0.3926990817
    marker_yaw_snap_step_deg: 90.0
    marker_yaw_snap_offset_deg: 0.0
    rack_floor_z: -0.95
    marker_alpha: 0.35
    text_marker_enabled: true
    text_marker_include_id: false
    marker_lifetime_sec: 2.5

    track_enabled: true
    track_match_distance_m: 0.50
    track_yaw_gate_deg: 45.0
    track_min_iou: 0.02
    track_max_match_cost: 2.40
    track_confirm_hits: 2
    track_instant_confirm_confidence: 0.45
    track_max_missed_sec: 8.0
    track_tentative_timeout_sec: 3.0
    track_position_alpha: 0.25
    track_yaw_alpha: 0.20
    track_confidence_alpha: 0.35
    track_moving_match_distance_m: 0.90
    track_lost_match_distance_m: 1.30
    track_moving_yaw_gate_deg: 75.0
    track_lost_yaw_gate_deg: 100.0
    track_reid_max_distance_m: 1.50
    track_reid_max_size_ratio_delta: 0.35
    track_reid_max_yaw_diff_deg: 100.0
    track_moving_speed_threshold_mps: 0.15

    marker_topic: /detection/rack_obb_markers
    centroid_topic: /detection/rack_centroids
    json_topic: /detection/rack_detections_json
    stable_track_topic: /tracking/stable_tracks
    publish_stable_tracks: true
    stable_track_include_lost: true
    bev_image_topic: /detection/bev_image
    publish_bev_image: true

    publish_tracking_centroids: false

track_manager_node:
  ros__parameters:
    target_frame: rslidar
    use_stable_tracks_input: true
    stable_track_topic: /tracking/stable_tracks
    stable_track_include_lost: true
    stable_track_preserve_missing_tracks: false
    stable_track_publish_disappeared_markers: false
    stable_track_discontinuity_distance_m: 1.50
    newly_appeared_hold_sec: 1.5
    motion_static_threshold_m: 0.03
    motion_moving_threshold_m: 0.12
    motion_required_updates: 3
    occluded_timeout_sec: 3.0
    disappeared_retention_sec: 4.0
    track_marker_lifetime_sec: 2.5

track_overview_gui_node:
  ros__parameters:
    track_state_topic: /tracking/track_states
    map_roi_min: [-14.5, -15.0]
    map_roi_max: [9.0, 6.0]
    map_pixels_per_meter: 35.0
    show_lost_tracks: true
    refresh_rate_hz: 1.0
    lookup_mode: track_id
    bev_image_topic: /detection/bev_image
    show_bev_background: true
    bev_overlay_max_time_delta_sec: 0.75
